<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC Bình Minh</title>

<style>

*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
padding:16px;
background:#f3f5f8;
font-size:18px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.controls{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}

select,button,input{
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2f7df6;
color:white;
border:none;
cursor:pointer;
}

button.delete{
background:#ff6b6b;
width:60px;
}

#inputContainer{
max-width:900px;
margin:auto;
}

.row{
display:grid;
gap:8px;
margin-bottom:10px;
}

.row input{
width:100%;
}

button.add,
button.random{
display:block;
margin:12px auto;
width:100%;
max-width:900px;
}

button.random{
font-size:20px;
padding:14px;
}

.table-wrap{
max-width:900px;
margin:auto;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

td,th{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

/* màu đội */

.team1{background:#2ecc71;color:white;} /* xanh lá */
.team2{background:#e74c3c;color:white;} /* đỏ */
.team3{background:#3498db;color:white;} /* xanh dương */
.team4{background:#f39c12;color:white;} /* cam */
.team5{background:#9b59b6;color:white;} /* tím */

@media (max-width:600px){

body{font-size:20px;}

select,button,input{
font-size:20px;
padding:14px;
}

}

</style>
</head>

<body>

<h1>⚽ FC Bình Minh ⚽</h1>

<div class="controls">

<select id="teamCount" onchange="updateInputs()">
<option value="2">2 đội</option>
<option value="3">3 đội</option>
<option value="4">4 đội</option>
<option value="5">5 đội</option>
</select>

</div>

<div id="inputContainer"></div>

<button class="add" onclick="addRow()">Thêm</button>

<button class="random" onclick="randomTeam()">Chia đội</button>

<h2 style="text-align:center">Kết quả</h2>

<div class="table-wrap">
<table id="resultTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script>

const container=document.getElementById("inputContainer")

function createInput(){
let input=document.createElement("input")
input.placeholder="Tên"
return input
}

function updateGrid(row){

let teamCount=Number(document.getElementById("teamCount").value)

row.style.gridTemplateColumns=`repeat(${teamCount},1fr) 70px`

}

function addRow(){

let teamCount=Number(document.getElementById("teamCount").value)

let row=document.createElement("div")
row.className="row"

for(let i=0;i<teamCount;i++){
row.appendChild(createInput())
}

let del=document.createElement("button")
del.innerText="X"
del.className="delete"
del.onclick=()=>row.remove()

row.appendChild(del)

updateGrid(row)

container.appendChild(row)

}

function updateInputs(){

let teamCount=Number(document.getElementById("teamCount").value)

let rows=document.querySelectorAll(".row")

rows.forEach(row=>{

let inputs=row.querySelectorAll("input")

if(inputs.length<teamCount){

for(let i=inputs.length;i<teamCount;i++){
row.insertBefore(createInput(),row.lastElementChild)
}

}

else if(inputs.length>teamCount){

for(let i=inputs.length;i>teamCount;i--){
inputs[i-1].remove()
}

}

updateGrid(row)

})

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=arr[i]
arr[i]=arr[j]
arr[j]=t

}

return arr

}

function randomTeam(){

let teamCount=Number(document.getElementById("teamCount").value)

let rows=document.querySelectorAll(".row")

let teams=[]

for(let i=0;i<teamCount;i++)
teams.push([])

rows.forEach(row=>{

let inputs=row.querySelectorAll("input")

let group=[]

inputs.forEach(i=>{
if(i.value.trim()!="")
group.push(i.value.trim())
})

if(group.length===0) return

shuffle(group)

let start=Math.floor(Math.random()*teamCount)

group.forEach((player,index)=>{

let teamIndex=(start+index)%teamCount

teams[teamIndex].push(player)

})

})

renderResult(teams)

}

function renderResult(teams){

let thead=document.querySelector("#resultTable thead")
let tbody=document.querySelector("#resultTable tbody")

thead.innerHTML=""
tbody.innerHTML=""

let head="<tr>"

teams.forEach((t,i)=>{
head+=`<th class="team${i+1}">Đội ${i+1}</th>`
})

head+="</tr>"

thead.innerHTML=head

let max=0

teams.forEach(t=>{
if(t.length>max)max=t.length
})

for(let i=0;i<max;i++){

let tr="<tr>"

teams.forEach(t=>{
tr+=`<td>${t[i]??""}</td>`
})

tr+="</tr>"

tbody.innerHTML+=tr

}

}

addRow()

</script>

</body>
</html>
