<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Chia Đội</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
margin:0;
padding:16px;
background:#f2f4f7;
font-size:18px;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
margin-bottom:20px;
}

select,button,input{
font-size:18px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
background:#2f7df6;
color:white;
font-weight:bold;
}

button.delete{
background:#ff6b6b;
padding:10px 14px;
}

button.add{
display:block;
margin:14px auto;
width:180px;
}

#inputContainer{
max-width:700px;
margin:auto;
}

.row{
display:flex;
gap:10px;
margin-bottom:12px;
align-items:center;
}

.row input{
flex:1;
min-width:70px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
font-size:18px;
}

td,th{
border:1px solid #ccc;
padding:12px;
text-align:center;
}

th{
background:#e8edf5;
font-size:20px;
}

.table-wrapper{
overflow-x:auto;
}

/* Mobile */

@media (max-width:600px){

body{
font-size:20px;
padding:12px;
}

h1{
font-size:26px;
}

.row{
flex-wrap:wrap;
}

.row input{
flex:1 1 45%;
}

button{
width:100%;
}

.controls{
flex-direction:column;
align-items:stretch;
}

button.add{
width:100%;
}

}

</style>
</head>

<body>

<h1>⚽ Random Chia Đội</h1>

<div class="controls">

<select id="teamCount" onchange="updateInputs()">
<option value="2">2 đội</option>
<option value="3">3 đội</option>
<option value="4">4 đội</option>
<option value="5">5 đội</option>
</select>

<button onclick="randomTeam()">Chia đội</button>

</div>

<div id="inputContainer"></div>

<button class="add" onclick="addRow()">Thêm</button>

<h2 style="text-align:center">Kết quả</h2>

<div class="table-wrapper">
<table id="resultTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script>

const container=document.getElementById("inputContainer")

function createInput(){
let input=document.createElement("input")
input.placeholder="Tên"
return input
}

function addRow(){

let teamCount=Number(document.getElementById("teamCount").value)

let row=document.createElement("div")
row.className="row"

for(let i=0;i<teamCount;i++){
row.appendChild(createInput())
}

let del=document.createElement("button")
del.innerText="Xoá"
del.className="delete"
del.onclick=()=>row.remove()

row.appendChild(del)

container.appendChild(row)

}

function updateInputs(){

let teamCount=Number(document.getElementById("teamCount").value)

let rows=document.querySelectorAll(".row")

rows.forEach(row=>{

let inputs=row.querySelectorAll("input")

if(inputs.length<teamCount){

for(let i=inputs.length;i<teamCount;i++){
row.insertBefore(createInput(),row.lastElementChild)
}

}
else if(inputs.length>teamCount){

for(let i=inputs.length;i>teamCount;i--){
inputs[i-1].remove()
}

}

})

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=arr[i]
arr[i]=arr[j]
arr[j]=t

}

return arr

}

function randomTeam(){

let teamCount=Number(document.getElementById("teamCount").value)

let rows=document.querySelectorAll(".row")

let teams=[]

for(let i=0;i<teamCount;i++)
teams.push([])

rows.forEach(row=>{

let inputs=row.querySelectorAll("input")

let group=[]

inputs.forEach(i=>{
if(i.value.trim()!="")
group.push(i.value.trim())
})

if(group.length===0) return

shuffle(group)

let start=Math.floor(Math.random()*teamCount)

group.forEach((player,index)=>{

let teamIndex=(start+index)%teamCount

teams[teamIndex].push(player)

})

})

renderResult(teams)

}

function renderResult(teams){

let thead=document.querySelector("#resultTable thead")
let tbody=document.querySelector("#resultTable tbody")

thead.innerHTML=""
tbody.innerHTML=""

let head="<tr>"

teams.forEach((t,i)=>{
head+=`<th>Đội ${i+1}</th>`
})

head+="</tr>"

thead.innerHTML=head

let max=0

teams.forEach(t=>{
if(t.length>max)max=t.length
})

for(let i=0;i<max;i++){

let tr="<tr>"

teams.forEach(t=>{
tr+=`<td>${t[i]??""}</td>`
})

tr+="</tr>"

tbody.innerHTML+=tr

}

}

addRow()

</script>

</body>
</html>
